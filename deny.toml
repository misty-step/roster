# cargo-deny supply-chain policy: bans, licenses, sources, and RustSec
# advisories, all run in one `cargo deny check` step in
# `.github/workflows/ci.yml` (roster-926 phase C2). Doctrine:
# primitives/shared/references/quality-gates.md.
# The allow-list encodes the licenses actually present today (ratchet floor);
# tighten it, never loosen it to pass.

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots (via ureq -> rustls) ships its CA-bundle data under this
    # permissive data license, not code; well precedented in the rustls
    # ecosystem's own deny.toml allow-lists.
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
