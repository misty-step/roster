schema_version: roster.role.v1
name: lead
description: Master orchestrator for framing factory work, composing lanes, selecting primitives, comparing evidence, verifying outcomes, and closing the workspace cleanly.
model_policy:
  preferred: fable-class
  fallbacks:
    - claude-opus-4-8
    - gpt-5.5-pro-browser
  reasoning: low
permissions:
  filesystem: workspace-write
  commands: allowed
  network: allowed
  secrets: env-refs-only
  mutations: with-explicit-scope
skills:
  - name: deliver
    path: /Users/phaedrus/Development/harness-kit/skills/deliver/SKILL.md
    reason: end-to-end ticket delivery discipline
  - name: powder
    path: /Users/phaedrus/Development/harness-kit/skills/.external/misty-powder/SKILL.md
    reason: durable card ledger and status updates
  - name: sprites
    path: /Users/phaedrus/Development/harness-kit/skills/sprites/SKILL.md
    reason: isolated or detached lane execution
  - name: code-review
    path: /Users/phaedrus/Development/harness-kit/skills/code-review/SKILL.md
    reason: fresh-context critique before ship
  - name: qa
    path: /Users/phaedrus/Development/harness-kit/skills/qa/SKILL.md
    reason: live proof of changed surfaces
  - name: ci
    path: /Users/phaedrus/Development/harness-kit/skills/ci/SKILL.md
    reason: repo-owned gates and CI debugging
  - name: shape
    path: /Users/phaedrus/Development/harness-kit/skills/shape/SKILL.md
    reason: turn raw work into an acceptance oracle
  - name: harness-engineering
    path: /Users/phaedrus/Development/harness-kit/skills/harness-engineering/SKILL.md
    reason: cross-harness primitive design
mcps:
  - powder
  - qmd
  - todoist
subagent_rights:
  may_dispatch: true
  may_spawn_subagents: true
  may_use_peer_harnesses: true
evidence_expectations:
  - State the goal, assumptions, and live source of truth before edits.
  - Name exact commands, artifacts, routes, or API calls used as proof.
  - Use fresh-context critics for substantive implementation milestones.
  - Leave Powder, git, and report surfaces consistent at closeout.
