<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roster - agent declarations for the factory</title>
    <meta
      name="description"
      content="Roster declares every agent Misty Step runs — role, model policy, permissions, skills, MCPs, evidence expectations — as plain files, then composes and dispatches that declaration onto any harness at run time."
    />

          document.documentElement.classList.add(m);
          document.documentElement.style.colorScheme = m;
        }
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="aesthetic.css" />
    <link rel="stylesheet" href="marketing.css" />
  </head>

        <nav class="ae-chrome msk-nav" aria-label="Site">
