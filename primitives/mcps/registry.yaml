schema_version: roster.mcp_registry.v1
provenance: >-
  Merged from the Roster catalog and the retired factory MCP status/provenance
  ledger on 2026-07-11; env refs only, no secret values, and no profiles.
mcps:
  - id: aesthetic
    status: not_applicable
    app: Aesthetic
    source_repo: misty-step/aesthetic
    source_ref: 0d4cf9a4a7b50fab5e00491daab35fa8cbef93ce
    product_skill: misty-aesthetic
    capabilities:
      - UI/UX doctrine
      - design law gates
      - tokens and static registry
    reason: Aesthetic ships a skill plus package/static API/law gate, not an MCP server.

  - id: bitterblossom
    status: not_applicable
    app: Bitterblossom
    source_repo: misty-step/bitterblossom
    source_ref: b017458d21d13d4f6f435a9e9307c575b6694b1f
    product_skill: misty-bitterblossom
    capabilities:
      - event-driven workflow agents
      - reflex plane inspection
      - run ledger inspection
    reason: >-
      Interactive stdio registration is disabled. Mode B workflows use the
      CLI/API, and Codex leaks completed-subagent MCP transports. Re-enable
      only with client lifecycle proof and a versioned installed bb binary.

  - id: canary
    status: available
    app: Canary
    source_repo: misty-step/canary
    source_ref: e9bce96a5c24654c2692ae701a6db596f5966471
    product_skill: misty-canary
    capabilities:
      - uptime monitoring
      - incident tracking
      - error logging
      - health checks
      - production debugging
    transport: stdio
    command: canary
    args:
      - mcp-server
    env_refs:
      - CANARY_ENDPOINT
      - CANARY_API_KEY

  - id: context7
    status: disabled
    transport: http
    env_refs:
      - CONTEXT7_API_KEY
    reason: >-
      Disabled on 2026-07-11 after Codex RMCP startup panicked with "Unfold
      must not be polled after it returned Poll::Ready(None)" while starting
      the Context7 HTTP/SSE MCP session; keep the role reference resolvable
      without enabling the server.

  - id: crucible
    status: available
    app: Crucible
    source_repo: misty-step/crucible
    capabilities:
      - eval spec design and execution
      - judge calibration and verdict reading
      - config and model comparison reports
      - run ledger inspection
    transport: stdio
    command: crucible
    args:
      - mcp
    env_refs:
      - OPENROUTER_API_KEY
    notes: >-
      Model-backed runs require OPENROUTER_API_KEY in the process environment;
      spec design, report reading, and ledger inspection work without it.

  - id: exa
    status: external
    transport: http
    env_refs:
      - EXA_API_KEY
    notes: Contextual research MCP referenced by the AI-scout role.

  - id: firecrawl
    status: external
    transport: http
    env_refs:
      - FIRECRAWL_API_KEY
    notes: Contextual research MCP referenced by the AI-scout role.

  - id: glass
    status: external
    notes: Contextual fleet-status MCP referenced by the orchestrator role.

  - id: landmark
    status: not_applicable
    app: Landmark
    source_repo: misty-step/landmark
    source_ref: 393e15c2f816036c1edd0985696ba4d2a64772d4
    product_skill: misty-landmark
    capabilities:
      - release intelligence
      - changelog synthesis
      - release kit planning
    reason: Landmark does not expose an MCP server yet; use the product skill and CLI/action contract.

  - id: mint
    status: available
    app: mint
    source_repo: misty-step/mint
    product_skill: misty-mint
    capabilities:
      - alias inspection (read-only)
      - policy validation (read-only)
      - audit tail (read-only)
      - proxy-contract usage docs
    transport: stdio
    command: mint-mcp

  - id: overmind
    status: available
    app: Overmind
    source_repo: misty-step/overmind
    capabilities:
      - post status updates and evidence to the fleet feed
      - report structured agent state
      - read fleet summary
      - read own-session snapshot (usage, status, policy state)
    transport: stdio
    command: overmind
    args:
      - mcp
      - --api-base
      - http://127.0.0.1:4177

  - id: powder
    status: available
    app: Powder
    source_repo: misty-step/powder
    source_ref: 8c7a16a7c1bf3748ea939691a6545bd0f73c8f40
    product_skill: misty-powder
    capabilities:
      - backlog management
      - issue claiming
      - issue updates
      - operator input requests
      - work status tracking
      - papercut friction reports
    transport: stdio
    command: powder-mcp
    env_refs:
      - POWDER_API_BASE_URL
      - POWDER_API_KEY
    notes: >-
      The operator environment supplies endpoint and credential references;
      Roster does not read a vault, Keychain, or secrets file.

  - id: qmd
    status: available
    transport: stdio
    command: qmd
    args:
      - mcp
    notes: The operator installs qmd on PATH and supplies project scope privately.

  - id: todoist
    status: available
    transport: http
    url: https://ai.todoist.net/mcp
    notes: Top-level Claude config exposes Todoist as an HTTP MCP.
