# Migrated from /Users/phaedrus/Development/harness-kit/.harness-kit/agents.yaml on 2026-07-04.
# Roster owns this copy from P0 forward; keep semantics aligned until routing bench evidence supersedes it.
version: 1
defaults:
  permissions: yolo
  reasoning: provider-default
  worktree: recommended
  smoke_timeout_s: 30
providers:
  codex:
    tier: primary
    kind: cli
    probe: codex --version
    dispatch: codex exec --dangerously-bypass-approvals-and-sandbox --model gpt-5.6-luna --config model_reasoning_effort="xhigh"
    output: json
    model: gpt-5.6-luna
    reasoning: xhigh
    permissions: dangerous bypass approvals and sandbox
    worktree: recommended
    smoke: codex exec --dangerously-bypass-approvals-and-sandbox --model gpt-5.6-luna --config model_reasoning_effort="xhigh"
    # How a NAMED custom subagent gets selected within this harness (roster-915,
    # evidence: ~/.factory-lanes/campaign/roster-910-report.md). Distinct from
    # `dispatch` above, which is about invoking the harness itself, not a
    # specific named agent inside it.
    agent_dispatch: in_session_only
    agent_model_override: per_agent_field
    notes: OpenAI Codex CLI; prefer non-interactive exec for isolated attempts. No `codex exec --agent <name>`-style external flag exists; named-agent selection is in-session only.
  claude:
    tier: conditional
    kind: cli
    probe: claude --version
    dispatch: claude -p --dangerously-skip-permissions --permission-mode bypassPermissions --model claude-opus-4-8 --effort xhigh
    output: json
    model: claude-opus-4-8
    reasoning: xhigh
    permissions: dangerous skip permissions plus bypass permission mode
    worktree: recommended
    smoke: claude -p --dangerously-skip-permissions --permission-mode bypassPermissions --model claude-opus-4-8 --effort xhigh
    agent_dispatch: in_session_task
    agent_model_override: per_agent_field
    notes: Claude Code CLI; conditional critic or Anthropic-specific lane, not the default roster bias.
  pi:
    tier: primary
    kind: cli
    probe: pi --version
    dispatch: pi -p --no-extensions --provider openrouter --model moonshotai/kimi-k2.7-code --thinking xhigh --tools read,bash,edit,write,grep,find,ls
    output: json
    model: openrouter/moonshotai/kimi-k2.7-code
    model_variants:
      default: openrouter/moonshotai/kimi-k2.7-code
      previous_kimi: openrouter/moonshotai/kimi-k2.6
      thinking_kimi: openrouter/moonshotai/kimi-k2-thinking
      long_context: openrouter/deepseek/deepseek-v4-pro
      budget_long_context: openrouter/deepseek/deepseek-v4-flash
      alternate_agentic: openrouter/minimax/minimax-m3
      qwen_coder: openrouter/qwen/qwen3-coder-next
    reasoning: xhigh
    permissions: full read bash edit write grep find ls tool list
    worktree: recommended
    smoke: pi -p --no-extensions --provider openrouter --model moonshotai/kimi-k2.7-code --thinking xhigh --tools read,bash,edit,write,grep,find,ls
    # Bare pi has no native named-agent registry at all (roster-910/roster-915
    # recon: no `agent`/`agents` subcommand, no `--agent` flag). The richer
    # `spawns:`/aliased-`model:` schema the roster-910 receipt found lives in
    # `omp` (can1357/oh-my-pi), a fork of pi, not pi itself -- see
    # `render_omp_agent` in roster-core and `roster materialize --harness omp`.
    agent_dispatch: none
    agent_model_override: n/a
    notes: >-
      Pi coding agent through OpenRouter. Smallest primary open-model peer lane;
      default to Kimi K2.7 Code and use variants for Kimi rollback, DeepSeek,
      MiniMax, and Qwen comparisons. Dispatch disables extensions so personal Pi
      extensions cannot fail harness receipts after model output. Do not treat
      Pi as a durable production control plane without an external sandbox and
      queue.
  goose:
    tier: primary
    kind: cli
    probe: goose --version
    dispatch: goose run --no-session --quiet --provider openrouter --model moonshotai/kimi-k2.7-code --text
    output: text
    model: openrouter/moonshotai/kimi-k2.7-code
    model_variants:
      default: openrouter/moonshotai/kimi-k2.7-code
      previous_kimi: openrouter/moonshotai/kimi-k2.6
      thinking_kimi: openrouter/moonshotai/kimi-k2-thinking
      long_context: openrouter/deepseek/deepseek-v4-pro
      budget_long_context: openrouter/deepseek/deepseek-v4-flash
      alternate_agentic: openrouter/minimax/minimax-m3
      qwen_coder: openrouter/qwen/qwen3-coder-next
    reasoning: provider-default
    permissions: goose configured tool permissions
    worktree: recommended
    smoke: goose run --no-session --quiet --provider openrouter --model moonshotai/kimi-k2.7-code --text
    agent_dispatch: cli_flag
    agent_model_override: recipe_settings_field
    notes: >-
      Goose on-machine agent through OpenRouter; primary open-model harness for
      MCP-heavy workflows that span code plus trackers, docs, browsers, chat, or
      internal tools. Named-agent selection is its `--recipe <name>` flag on
      `goose run`; the recipe's own `settings` block carries the model.
  opencode:
    tier: primary
    kind: cli
    probe: opencode --version
    dispatch: opencode run --model openrouter/moonshotai/kimi-k2.7-code --variant max --format json
    output: stream-json
    model: openrouter/moonshotai/kimi-k2.7-code
    model_variants:
      default: openrouter/moonshotai/kimi-k2.7-code
      previous_kimi: openrouter/moonshotai/kimi-k2.6
      thinking_kimi: openrouter/moonshotai/kimi-k2-thinking
      long_context: openrouter/deepseek/deepseek-v4-pro
      budget_long_context: openrouter/deepseek/deepseek-v4-flash
      alternate_agentic: openrouter/minimax/minimax-m3
      qwen_coder: openrouter/qwen/qwen3-coder-next
    reasoning: max variant
    permissions: opencode configured permissions
    worktree: recommended
    smoke: opencode run --model openrouter/moonshotai/kimi-k2.7-code --variant max --format json
    # OpenCode is the one harness with BOTH paths: an external `--agent <name>`
    # CLI flag on `opencode run` AND an in-session `task` tool for a primary
    # agent to fan out to subagents.
    agent_dispatch: both
    agent_model_override: both
    notes: >-
      OpenCode CLI through OpenRouter; preferred open candidate for code-centric
      review runner experiments because of its session/service shape and JSON
      event output. Still only a per-job kernel: durable queue, sandbox, policy,
      publisher, and eval storage stay outside the CLI.
  agy:
    tier: conditional
    kind: cli
    probe: agy --help
    dispatch: agy --dangerously-skip-permissions --print-timeout 10m --print
    output: text
    model: gemini-3.5-flash
    reasoning: medium
    permissions: dangerous skip permissions
    worktree: recommended
    smoke: agy --dangerously-skip-permissions --print-timeout 2m --print
    notes: Google Antigravity CLI; keep --print last because it consumes the next argument as the prompt.
  cursor-agent:
    tier: conditional
    kind: cli
    probe: cursor-agent --version
    dispatch: cursor-agent -p --yolo --sandbox disabled --trust --approve-mcps --model composer-2.5
    output: text
    model: composer-2.5
    reasoning: max mode off
    permissions: yolo force with sandbox disabled and trusted workspace
    worktree: recommended
    smoke: cursor-agent -p --yolo --sandbox disabled --trust --approve-mcps --model composer-2.5
    # No dedicated "spawn agent" tool distinct from re-invoking the CLI: a
    # cursor-agent subagent spawns further subagents by shelling back out to
    # `cursor-agent` in headless mode.
    agent_dispatch: in_session_task_or_reinvoke
    agent_model_override: per_agent_field
    notes: Cursor CLI path; enable only when the binary is installed and tested.
  grok-build:
    tier: conditional
    kind: cli
    probe: grok --version
    dispatch: grok --model grok-4.3 --permission-mode bypassPermissions --always-approve --effort max --reasoning-effort xhigh -p
    output: text
    model: grok-4.3
    reasoning: max effort with xhigh reasoning effort
    permissions: bypass permissions plus always approve
    worktree: recommended
    smoke: grok --model grok-4.3 --permission-mode bypassPermissions --always-approve --effort max --reasoning-effort xhigh -p
    notes: xAI Grok CLI; local Grok Build entitlement may fail, so default to the working Grok CLI model.
  oracle:
    tier: conditional
    kind: cli
    probe: npx --version
    dispatch: npx -y @steipete/oracle --engine browser --model gpt-5.5-pro -p
    output: text
    model: gpt-5.5-pro-browser
    reasoning: ChatGPT browser Pro thinking
    permissions: browser automation through signed-in ChatGPT session
    worktree: recommended
    smoke: 'npx -y @steipete/oracle --engine browser --model gpt-5.5-pro --dry-run summary -p "Roster Oracle smoke: summarize README.md in one sentence." --file README.md'
    notes: Oracle consult surface. Roster uses browser mode only; API mode, provider flags, and multi-model API panels are not part of this provider target.
  manual:
    tier: manual
    kind: manual
    probe: manual
    dispatch: manual
    output: manual-summary
    permissions: human supplied
    worktree: not_applicable
    notes: Fallback for GUI-only tools, unavailable CLIs, or imported reports.
