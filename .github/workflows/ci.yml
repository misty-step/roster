name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Supply-chain policy (cargo-deny)
        run: |
          cargo install cargo-deny --locked
          cargo deny check
      - name: Primitives catalog gate (roster check)
        run: cargo run --locked -p roster-cli -- check
      - name: Coverage
        # Ratchet from roster-010 baseline (2026-07-04):
        # cargo llvm-cov --workspace --fail-under-file-lines 82
        # roster-cli/src/main.rs 100.00% line coverage; workspace minimum file
        # line coverage was roster-core/src/lib.rs at 82.35%.
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --workspace --fail-under-file-lines 82
